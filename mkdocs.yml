site_name: Wu Trading Library
site_description: A low-level backtesting library for algorithmic trading
site_author: Jaime Lopez
site_url: https://jailop.codeberg.page/wutrader/

repo_url: https://codeberg.org/jailop/wu
repo_name: codeberg/wu

theme:
  name: readthedocs
  highlightjs: true
  hljs_languages:
    - c
    - python

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - codehilite:
      guess_lang: false
  - def_list
  - footnotes

nav:
  - Home: index.md
  - Installation: installation.md
  - Features: features.md
  - Tutorial: tutorial.md
  - Guides:
    - Architecture: design/architecture.md
    - Execution Models: design/execution.md
    - Timestamps: guides/timestamps.md
    - Data Formats: guides/data-formats.md
    - Indicators: guides/indicators.md
    - Risk Metrics: guides/risk-metrics.md
    - Portfolio Configuration: portfolio-configuration.md
    - Position Sizing: design/position_sizing.md
  - Examples:
    - Crossover Strategy: examples/crossover.md
    - Pairs Trading: examples/pairs_trading.md
  - Cheatsheets:
    - Indicators: cheatsheets.md
  - FAQ: faq.md
  - API Reference: https://jailop.codeberg.page/wutrader/docs/html/
  - Repository: https://codeberg.org/jailop/wu

docs_dir: docs_src
site_dir: docs

extra:
  version: 0.2.0

